spring:
  application:
    name: parag-indexer

  datasource:
    url: jdbc:postgresql://localhost:5432/parag
    username: parag
    password: parag_dev
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: parag-indexer
      # Start from the beginning the first time this group runs, so a fresh
      # `docker compose down` + replay reindexes the whole corpus.
      auto-offset-reset: earliest
      # Manual ack: we only commit the offset AFTER the chunk write + ACL update
      # have committed to Postgres. This is what makes redelivery safe (at-least-once).
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
      properties:
        schema.registry.url: http://localhost:8081
        # Return generated SpecificRecord (DocEvent), not generic GenericRecord.
        specific.avro.reader: true
    listener:
      # Commit offsets manually, one record at a time, after successful processing.
      ack-mode: manual_immediate

# Where the Python embedding service lives.
parag:
  embedding:
    base-url: http://localhost:8000
    dim: 384

logging:
  level:
    io.parag: INFO
    org.apache.kafka: WARN
